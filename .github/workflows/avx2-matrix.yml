name: AVX2 Full Probe Matrix

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  # ─── Linux (GitHub-hosted) ───────────────────────────────────────────────
  linux:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux ubuntu-22.04 x64
            runs_on: ubuntu-22.04
          - name: linux ubuntu-24.04 x64
            runs_on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install g++
        run: sudo apt-get update -q && sudo apt-get install -y g++
      - name: Build + Run
        run: bash scripts/run_probe.sh
      - name: Show CPU flags
        run: |
          grep -m1 "model name" /proc/cpuinfo || true
          grep -m1 "^flags" /proc/cpuinfo | tr ' ' '\n' | grep -E "avx|sse|fma|bmi" | sort || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: probe-${{ matrix.name }}
          path: out/

  # ─── macOS (GitHub-hosted) ───────────────────────────────────────────────
  macos:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Apple Silicon — x86_64 binary via Rosetta 2 (AVX2 NOT supported by Rosetta)
          - name: macos-14 apple-silicon rosetta2 x86_64
            runs_on: macos-14
            mode: rosetta
          - name: macos-15 apple-silicon rosetta2 x86_64
            runs_on: macos-15
            mode: rosetta
    steps:
      - uses: actions/checkout@v4
      - name: Show CPU info
        run: |
          uname -m
          sysctl -n machdep.cpu.brand_string 2>/dev/null || sysctl -n hw.model || true
          sysctl -n hw.optional.avx2_0 2>/dev/null && echo "AVX2 sysctl: YES" || echo "AVX2 sysctl: NO"
          # Check if Rosetta is available
          if [ "${{ matrix.mode }}" = "rosetta" ]; then
            softwareupdate --install-rosetta --agree-to-license 2>/dev/null || true
          fi
      - name: Build x86_64 + Run under Rosetta 2
        if: matrix.mode == 'rosetta'
        run: |
          echo "=== Building x86_64 binary (cross-compile for Rosetta) ==="
          mkdir -p out
          clang++ -O2 -target x86_64-apple-macos10.15 -mavx2 -mfma -mbmi -mbmi2 \
            -o out/avx2_full_probe src/avx2_full_probe.cpp
          echo "=== arch of binary ==="
          file out/avx2_full_probe
          echo "=== Running under Rosetta 2 ==="
          arch -x86_64 out/avx2_full_probe | tee out/probe.log || true
          echo "Exit code: $?"
          echo "=== Expected: FATAL AVX2 not available (Rosetta blocks AVX/AVX2) ==="
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: probe-${{ matrix.name }}
          path: out/

  # ─── Windows (GitHub-hosted) ─────────────────────────────────────────────
  windows:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-2022 x64 msvc
            runs_on: windows-2022
            compiler: msvc
    steps:
      - uses: actions/checkout@v4
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
      - name: Build + Run (MSVC)
        shell: cmd
        run: scripts\run_probe.bat
        continue-on-error: true
      - name: Show CPU info (Windows)
        shell: pwsh
        run: |
          Get-WmiObject -Class Win32_Processor | Select-Object Name, NumberOfCores | Format-List
          (Get-WmiObject -Class Win32_Processor).Description
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: probe-${{ matrix.name }}
          path: out/

  # ─── Self-hosted cloud runners (uncomment labels to enable) ───────────────
  cloud-self-hosted:
    name: ${{ matrix.name }}
    if: ${{ false }}   # ← flip to true after registering runners
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: aws x64 linux
            runs_on: [self-hosted, linux, x64, aws]
          - name: gcp x64 linux
            runs_on: [self-hosted, linux, x64, gcp]
          - name: azure x64 linux
            runs_on: [self-hosted, linux, x64, azure]
    steps:
      - uses: actions/checkout@v4
      - name: Build + Run
        run: bash scripts/run_probe.sh
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: probe-${{ matrix.name }}
          path: out/
