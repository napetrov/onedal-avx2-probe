name: AVX2 Full Probe Matrix

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  # ─── Linux (GitHub-hosted) ───────────────────────────────────────────────
  linux:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux ubuntu-20.04 x64
            runs_on: ubuntu-20.04
          - name: linux ubuntu-22.04 x64
            runs_on: ubuntu-22.04
          - name: linux ubuntu-24.04 x64
            runs_on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install g++
        run: sudo apt-get update -q && sudo apt-get install -y g++
      - name: Build + Run
        run: bash scripts/run_probe.sh
      - name: Show CPU flags
        run: |
          grep -m1 "model name" /proc/cpuinfo || true
          grep -m1 "^flags" /proc/cpuinfo | tr ' ' '\n' | grep -E "avx|sse|fma|bmi" | sort || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: probe-${{ matrix.name }}
          path: out/

  # ─── macOS (GitHub-hosted) ───────────────────────────────────────────────
  macos:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Intel Mac (x86_64) — AVX2 supported since Haswell
          - name: macos-13 intel x86_64
            runs_on: macos-13
          - name: macos-12 intel x86_64
            runs_on: macos-12
    steps:
      - uses: actions/checkout@v4
      - name: Show CPU info
        run: |
          uname -m
          sysctl -n machdep.cpu.brand_string 2>/dev/null || true
          sysctl -n hw.optional.avx2_0 2>/dev/null && echo "AVX2 sysctl: supported" || echo "AVX2 sysctl: NOT reported"
      - name: Build + Run
        run: CXX=clang++ CXXFLAGS="-O2 -mavx2 -mfma -mbmi -mbmi2" bash scripts/run_probe.sh
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: probe-${{ matrix.name }}
          path: out/

  # ─── Windows (GitHub-hosted) ─────────────────────────────────────────────
  windows:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-2022 x64 msvc
            runs_on: windows-2022
            compiler: msvc
          - name: windows-2019 x64 msvc
            runs_on: windows-2019
            compiler: msvc
    steps:
      - uses: actions/checkout@v4
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
      - name: Build + Run (MSVC)
        shell: cmd
        run: scripts\run_probe.bat
        continue-on-error: true
      - name: Show CPU info (Windows)
        shell: pwsh
        run: |
          Get-WmiObject -Class Win32_Processor | Select-Object Name, NumberOfCores | Format-List
          (Get-WmiObject -Class Win32_Processor).Description
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: probe-${{ matrix.name }}
          path: out/

  # ─── Self-hosted cloud runners (uncomment labels to enable) ───────────────
  cloud-self-hosted:
    name: ${{ matrix.name }}
    if: ${{ false }}   # ← flip to true after registering runners
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: aws x64 linux
            runs_on: [self-hosted, linux, x64, aws]
          - name: gcp x64 linux
            runs_on: [self-hosted, linux, x64, gcp]
          - name: azure x64 linux
            runs_on: [self-hosted, linux, x64, azure]
    steps:
      - uses: actions/checkout@v4
      - name: Build + Run
        run: bash scripts/run_probe.sh
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: probe-${{ matrix.name }}
          path: out/
